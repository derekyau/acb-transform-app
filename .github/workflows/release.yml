name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Branch, Tag, or SHA"
        default: "main"
        required: true
        type: string

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  validate-release:
    name: Validate release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release-metadata.outputs.release_tag }}
    env:
      SOURCE_REF: ${{ inputs.source_ref }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ env.SOURCE_REF }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Resolve release metadata
        id: release-metadata
        run: |
          package_version="$(node -p "require('./package.json').version")"
          release_tag="v$package_version"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "Release tag resolved from package.json: $release_tag"

      - name: Verify release exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-metadata.outputs.release_tag }}
        run: gh release view "$RELEASE_TAG"

  build-macos:
    name: Build and upload macOS release assets
    needs: validate-release
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      RELEASE_TAG: ${{ needs.validate-release.outputs.release_tag }}
      SOURCE_REF: ${{ inputs.source_ref }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ env.SOURCE_REF }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build macOS DMG and ZIP
        run: npm run dist:mac -- --x64 --arm64 --publish never

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-${{ needs.validate-release.outputs.release_tag }}
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" release/*.dmg release/*.zip --clobber

  build-windows:
    name: Build and upload Windows release assets
    needs: validate-release
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      RELEASE_TAG: ${{ needs.validate-release.outputs.release_tag }}
      SOURCE_REF: ${{ inputs.source_ref }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ env.SOURCE_REF }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build Windows installer
        run: npm run dist:win -- --publish never

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-${{ needs.validate-release.outputs.release_tag }}
          path: |
            release/*.exe
          if-no-files-found: error

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" release/*.exe --clobber
